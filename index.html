const OD_COMPAT = {"22":["22","25","28"],"25":["25","28"],"28":["28"]};

const toInt   = v => parseInt(String(v||"").replace(/[\s,]/g,""))||0;
const toFloat = v => parseFloat(String(v||"").trim())||0;

const fmtNum  = n => n>=100000?(n/100000).toFixed(2)+" L":n.toLocaleString("en-IN");

function parseMat(raw){
  const s=String(raw||"").trim();
  return{od:(s.match(/M(22|25|28)$/)||[])[1]||null,thick:+((s.match(/G(\d{2})\d/)||[])[1]||0)||null,grade:(s.match(/G\d{2}(\d{3})/)||[])[1]||null,isAB:s.includes("AB")};
}
function canFill(stockRaw,orderRaw){
  const s=parseMat(String(stockRaw||"").replace(/^3SF/,"3FG")),o=parseMat(String(orderRaw||""));
  if(!s.thick||s.thick!==o.thick)return false;
  if(!(OD_COMPAT[o.od]||[o.od]).includes(s.od))return false;
  if(o.isAB&&!s.isAB)return false;
  return true;
}
async function readXL(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null,raw:false}));}catch(err){rej(err);}};
    fr.onerror=rej;fr.readAsArrayBuffer(file);
  });
}
function buildMetPlan(bareData,penData,cfg){
  const bare=bareData.filter(r=>r.Batch),pend=penData.filter(r=>r.Material&&toInt(r["Pending Rolls"])>0);
  const rows=bare.map(b=>{
    const bW=toInt(b.Width),bL=toInt(String(b.Length).replace(/\s/g,"")),bTh=toFloat(b.Thickness);
    const sv=pend.filter(o=>Math.abs(toFloat(o.Thickness)-bTh)<0.5);
    const odC={"22":0,"25":0,"28":0};
    sv.forEach(o=>{const p=parseMat(String(o.Material));if(p.od)odC[p.od]+=toInt(o["Pending Rolls"]);});
    const dom=Object.entries(odC).sort((a,b)=>b[1]-a[1])[0]?.[0]||"22";
    const m1ok=bW>=1910&&bW<=3290,m2ok=bW>=2900&&bW<=3630;
    return{id:uid(),machine:m1ok&&!m2ok?"M-1":!m1ok&&m2ok?"M-2":"M-1",m1ok,m2ok,setNo:1,slotNo:1,odType:dom,
      bareMat:String(b.Material||"").trim(),batch:String(b.Batch||"").trim(),width:bW,length:bL,thickness:bTh,
      outputMat:String(b.Material||"").replace("3FG-G","3SF-G").trim(),
      customers:[...new Set(sv.map(o=>String(o["Consignee Name"]||"").split(" ").slice(0,2).join(" ")))].join(", ")||"-",
      cumMeters:0,notes:"",priority:dom==="22"?0:dom==="25"?1:2};
  });
  ["M-1","M-2"].forEach(machine=>{
    const mr=rows.filter(r=>r.machine===machine);mr.sort((a,b)=>a.priority-b.priority);
    let sN=1,slN=1,cum=0,slots=0,cap={22:cfg.boatCap22,25:cfg.boatCap25,28:cfg.boatCap28}[mr[0]?.odType||"22"]||5;
    mr.forEach((r,i)=>{
      if(i>0&&(slots>=cap||cum>=cfg.boatTarget)){sN++;slN=1;slots=0;cum=0;cap={22:cfg.boatCap22,25:cfg.boatCap25,28:cfg.boatCap28}[r.odType]||5;}
      r.setNo=sN;r.slotNo=slN;cum+=r.length;r.cumMeters=cum;slN++;slots++;
    });
  });
  return rows;
}

function ChatBot({analysis,metPlan,cfg,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",text:`Hello! I am your Plan Power AI.\n\nOrders: ${analysis?.pend?.length||0}\nRuns: ${metPlan?.length||0}\nBoat target: ${fmtNum(cfg.boatTarget)} m/set\n\nAsk me about your production plan!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const ctx=()=>[
    `You are Plan Power AI, expert planning assistant for ${cfg.companyName} Met Department.`,
    `Boat target: ${fmtNum(cfg.boatTarget)} m/set. 2.2OD max ${cfg.boatCap22} runs, 2.5OD max ${cfg.boatCap25}, 2.8OD max ${cfg.boatCap28}.`,
    `Trim max: ${cfg.trimMax}mm. M-1: 1910-3290mm, M-2: 2900-3630mm.`,
    analysis?`Data: ${analysis.pend.length} orders, ${(analysis.totalKg/1000).toFixed(1)}MT total.`:"No data loaded.",
    "Answer concisely."
  ].join("\n");
  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput("");
    setMsgs(m=>[...m,{role:"user",text:msg}]);setLoading(true);
    try{
      const hist=msgs.slice(-8).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));

function App(){
  const [user,setUser]=useState(null);
  const [cfg,setCfg]=useState({...DEFAULT_CONFIG});
  const [tab,setTab]=useState("upload");
  const [data,setData]=useState({pen:[],mj:[],fgjm:[],bare:[]});
  const [busy,setBusy]=useState("");
  const [analysis,setAnalysis]=useState(null);
  const [micron,setMicron]=useState("all");
  const [selected,setSelected]=useState(new Set());
  const [planRows,setPlanRows]=useState([newPlanRow()]);
  const [showSug,setShowSug]=useState(false);
  const [metPlan,setMetPlan]=useState([]);
  const [metView,setMetView]=useState("M-1");
  const [expandedSet,setExpanded]=useState({});
  const [showAdmin,setShowAdmin]=useState(false);
  const [showChat,setShowChat]=useState(false);
  const [installable,setInstallable]=useState(false);
  const [deferredPrompt,setDP]=useState(null);
  const [toast,setToast]=useState("");
  const toastTimer=useRef(null);

  useEffect(()=>{
    // Hide splash as soon as React has mounted - no fixed timeout
    const s=document.getElementById("pp-splash");
    if(s){s.classList.add("fade");setTimeout(()=>{s.style.display="none";},600);}
    window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();setDP(e);setInstallable(true);});
    window.addEventListener("appinstalled",()=>{setInstallable(false);showToast("Plan Power installed!");});
  },[]);

  const showToast=msg=>{setToast(msg);clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(""),3000);};
  const logout=()=>{setUser(null);setTab("upload");setAnalysis(null);setMetPlan([]);setShowChat(false);setShowAdmin(false);};
  const installApp=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;setDP(null);setInstallable(false);if(outcome==="accepted")showToast("Installing...");};

  const allLoaded=Object.values(data).every(d=>d.length>0);

  const upload=async(k,file)=>{
    if(user?.role==="viewer"){showToast("View only - cannot upload");return;}
    setBusy(k);
    try{setData(d=>({...d,[k]:[]}));const parsed=await readXL(file);setData(d=>({...d,[k]:parsed}));showToast(`${k.toUpperCase()}: ${parsed.length} rows loaded`);}
    catch(e){alert("Read error: "+e.message);}
    setBusy("");
  };

  const analyze=useCallback(()=>{
    const pend=data.pen.filter(r=>r.Material&&toInt(r["Pending Rolls"])>0);
    const results=pend.map(order=>{
      const oMat=String(order.Material).trim(),oW=toInt(order.Width),oL=toInt(order.Length),op=parseMat(oMat),minT=op.od==="22"?cfg.trimMinOD22:cfg.trimMinOD25;
      const fg=data.fgjm.find(x=>x.Batch&&canFill(x.Material,oMat)&&Math.abs(toInt(x.Width)-oW)<=5);
      if(fg)return{order,source:"FGJM",ref:fg};
      const mj=data.mj.find(x=>x.Batch&&canFill(String(x.Material).replace(/^3SF/,"3FG"),oMat)&&toInt(x.Width)>=oW+minT&&toInt(x.Length)>=oL);
      if(mj)return{order,source:"MJ",ref:mj};
      const bare=data.bare.find(x=>x.Batch&&Math.abs(toFloat(x.Thickness)-(op.thick||0))<0.5&&toInt(x.Width)>=1910);
      if(bare)return{order,source:"BARE",ref:bare};
      return{order,source:"NONE",ref:null};
    });
    const micMap={};
    pend.forEach(o=>{const th=toFloat(o.Thickness);if(!th)return;if(!micMap[th])micMap[th]={kg:0,rolls:0};micMap[th].kg+=toFloat(o["Pend. Prod."]);micMap[th].rolls+=toInt(o["Pending Rolls"]);});
    setAnalysis({results,micMap,totalKg:Object.values(micMap).reduce((s,v)=>s+v.kg,0),pend});
    setTab("analysis");showToast(`${results.length} orders analyzed`);
  },[data,cfg]);

  const genMetPlan=useCallback(()=>{
    const plan=buildMetPlan(data.bare,data.pen,cfg);
    setMetPlan(plan);setTab("metseq");
    const exp={};plan.forEach(r=>{const k=r.machine+"_"+r.setNo;if(!exp[k])exp[k]=true;});setExpanded(exp);
    showToast(`${plan.length} runs generated`);
  },[data,cfg]);

  const toggleSel=key=>setSelected(s=>{const n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});
  const updPRow=(id,k,v)=>setPlanRows(p=>p.map(r=>r.id===id?{...r,[k]:v}:r));
  const updArm=(id,i,v)=>setPlanRows(p=>p.map(r=>{if(r.id!==id)return r;const a=[...r.arms];a[i]=v;return{...r,arms:a};}));
  const calcRS=row=>row.arms.filter(Boolean).map(Number).reduce((a,b)=>a+b,0)+toInt(row.trim);
  const calcNR=row=>{const rs=calcRS(row);if(!rs||!row.jLength||!row.slit)return"-";return((toInt(row.slit)*toInt(row.sets))/toInt(row.jLength)).toFixed(3);};
  const mHint=w=>Object.entries(M_RANGE).filter(([,r])=>w>=r[0]&&w<=r[1]).map(([k])=>k);
  const updMet=(id,k,v)=>setMetPlan(p=>p.map(r=>r.id===id?{...r,[k]:v}:r));
  const moveMet=(id,dir)=>setMetPlan(p=>{const i=p.findIndex(r=>r.id===id);if((dir<0&&i===0)||(dir>0&&i===p.length-1))return p;const n=[...p];[n[i],n[i+dir]]=[n[i+dir],n[i]];return n;});

  const filteredOrders=useMemo(()=>(analysis?.pend||[]).filter(o=>micron==="all"||toFloat(o.Thickness)===parseFloat(micron)),[analysis,micron]);
  const byS=useMemo(()=>{const b={FGJM:0,MJ:0,BARE:0,NONE:0};(analysis?.results||[]).forEach(r=>b[r.source]++);return b;},[analysis]);
  const suggestions=useMemo(()=>{
    if(!analysis||!selected.size)return[];
    const ws=[...new Set(filteredOrders.filter(o=>selected.has(getKey(o))).map(o=>toInt(o.Width)).filter(Boolean))];
    const res=[],tryC=combo=>{const sum=combo.reduce((a,b)=>a+b,0);for(let t=cfg.trimMinOD22;t<=cfg.trimMax;t++){const j=sum+t;if(j>=1910&&j<=3630)res.push({arms:[...combo],jumbo:j,trim:t});}};
    ws.forEach(a=>tryC([a]));for(let i=0;i<ws.length;i++)for(let j=i;j<ws.length;j++){tryC([ws[i],ws[j]]);for(let k=j;k<ws.length;k++)tryC([ws[i],ws[j],ws[k]]);}
    return[...new Map(res.map(r=>[r.arms.slice().sort().join(",")+"-"+r.jumbo,r])).values()].sort((a,b)=>Math.abs(a.jumbo-cfg.jumboPref)-Math.abs(b.jumbo-cfg.jumboPref)).slice(0,7);
  },[analysis,selected,filteredOrders,cfg]);

  const shownMet=metPlan.filter(r=>r.machine===metView);
  const boatSets=useMemo(()=>{const s={};shownMet.forEach(r=>{if(!s[r.setNo])s[r.setNo]={no:r.setNo,rows:[],maxMeters:0};s[r.setNo].rows.push(r);s[r.setNo].maxMeters=r.cumMeters;});return Object.values(s).sort((a,b)=>a.no-b.no);},[shownMet]);

  const TH={background:"#eef1f7",color:"#4b5a6e",padding:"8px 11px",textAlign:"left",fontSize:11,fontWeight:700,letterSpacing:.4,textTransform:"uppercase",borderBottom:"2px solid #dde3ed",whiteSpace:"nowrap"};
  const TD={padding:"8px 11px",fontSize:13,color:C.text,borderBottom:"1px solid #dde3ed",verticalAlign:"middle"};
  const srcBadge=src=>({background:SRC[src].badge,color:SRC[src].text,border:`1px solid ${SRC[src].border}`,padding:"3px 10px",borderRadius:18,fontSize:11,fontWeight:700,display:"inline-block"});

  const TABS=[
    {id:"upload",label:"Upload"},
    {id:"analysis",label:"Analysis",dis:!analysis},
    {id:"plan",label:"MET/F/04",dis:!analysis},
    {id:"metseq",label:"Met Seq",dis:!metPlan.length},
  ];

  if(!user)return <LoginScreen onLogin={u=>{setUser(u);showToast(`Welcome, ${u.name}!`);}}/>;

  return(
    <>
      <style>{CSS}</style>
      {showAdmin&&user.role==="admin"&&<AdminPanel cfg={cfg} setCfg={c=>{setCfg(c);showToast("Settings saved!");}} onClose={()=>setShowAdmin(false)}/>}
      {showChat&&<ChatBot analysis={analysis} metPlan={metPlan} cfg={cfg} onClose={()=>setShowChat(false)}/>}
      <div style={{minHeight:"100vh",background:"#f0f4f8",display:"flex",flexDirection:"column"}}>
        <div style={{background:C.navy,padding:"0 16px",display:"flex",alignItems:"stretch",boxShadow:"0 2px 12px rgba(26,48,92,.22)",position:"sticky",top:0,zIndex:100,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px 10px 0",marginRight:8,borderRight:"1px solid rgba(255,255,255,.1)"}}>
            <Logo size={30}/>
            <div><div style={{fontSize:14,fontWeight:800,color:"#fff"}}>PLAN POWER</div><div style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>GLS POLYFILMS - MET DEPT</div></div>
          </div>

              </div>
              {boatSets.length===0?<div style={{...card({textAlign:"center",color:"#4b5a6e",padding:40})}}>No {metView} runs. Upload BARE + PEN files and click Met Sequence.</div>
              :boatSets.map(set=>{
                const pct=Math.min(100,(set.maxMeters/cfg.boatTarget)*100),over=set.maxMeters>cfg.boatTarget,vOK=set.rows[0]?.odType==="22",sk=metView+"_"+set.no,isE=expandedSet[sk]!==false;
                return(
                  <div key={set.no} style={{...card({marginBottom:14,borderColor:vOK?"#bfdbfe":"#fca5a5",borderWidth:2})}}>
                    <div onClick={()=>setExpanded(e=>({...e,[sk]:!isE}))} style={{display:"flex",alignItems:"center",gap:10,marginBottom:isE?12:0,cursor:"pointer",flexWrap:"wrap"}}>
                      <div style={{background:vOK?C.navy:C.red,color:"#fff",borderRadius:7,padding:"6px 14px",fontWeight:800,fontSize:14}}>Set {set.no}</div>
                      <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap"}}>
                        {set.rows.map(r=>{const os=OD_STYLE[r.odType]||OD_STYLE["??"];return<span key={r.id} style={{background:os.bg,color:os.text,border:`1px solid ${os.border}`,padding:"3px 9px",borderRadius:18,fontSize:11,fontWeight:700}}>{os.label}</span>;})}
                      </div>
                      <div style={{textAlign:"right",marginLeft:"auto"}}>
                        <div style={{fontSize:13,fontWeight:700,color:over?C.red:"#1e40af"}}>{fmtNum(set.maxMeters)} / {fmtNum(cfg.boatTarget)} m</div>
                        <div style={{fontSize:11,color:"#94a3b8"}}>{set.rows.length} runs</div>
                      </div>
                    </div>
                    {!vOK&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",color:C.red,padding:"6px 12px",borderRadius:7,fontSize:12,fontWeight:700,marginBottom:isE?12:6}}>First run is NOT 2.2 OD - boat damage risk!</div>}
                    {isE&&<>
                      <div style={{background:"#f1f5f9",borderRadius:4,height:7,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:over?"#dc2626":pct>90?"#f59e0b":"#22c55e",borderRadius:4}}/></div>
                      <div style={{overflowX:"auto",borderRadius:9,border:"1px solid #dde3ed"}}>
                        <table style={{width:"100%",background:"#fff",minWidth:700}}>
                          <thead><tr>{["Slot","OD","Bare Material","Batch","W(mm)","L(m)","Thick","Output","Cum.m","Notes","Actions"].map(h=><th key={h} style={{...TH,padding:"7px 9px"}}>{h}</th>)}</tr></thead>
                          <tbody>{set.rows.map((r,ri)=>{const os=OD_STYLE[r.odType]||OD_STYLE["??"],isF=ri===0;return(
                            <tr key={r.id} className="pprow" style={{background:isF?"#fffbeb":ri%2?"#f7f9fc":"#fff"}}>
                              <td style={{...TD,fontWeight:800,color:C.navy,textAlign:"center"}}>{isF?"*":""}{r.slotNo}</td>
                              <td style={{...TD,width:80}}><select value={r.odType} disabled={user.role==="viewer"} onChange={e=>updMet(r.id,"odType",e.target.value)} style={{background:os.bg,color:os.text,border:`1px solid ${os.border}`,borderRadius:5,padding:"3px 6px",fontSize:11,fontWeight:700,fontFamily:"inherit"}}><option value="22">2.2 OD</option><option value="25">2.5 OD</option><option value="28">2.8 OD</option></select></td>
                              {["bareMat","batch","width","length","thickness","outputMat","cumMeters","notes"].map(k=>(
                                <td key={k} style={{...TD,padding:"5px 7px"}}><input value={r[k]||""} readOnly={user.role==="viewer"} onChange={e=>updMet(r.id,k,e.target.value)} className="ppec" style={{fontFamily:["bareMat","batch","outputMat"].includes(k)?"monospace":"inherit",fontSize:11}}/></td>
                              ))}
                              <td style={{...TD,width:90}}>{user.role!=="viewer"&&<div style={{display:"flex",gap:4}}>
                                <button onClick={()=>moveMet(r.id,-1)} style={{...btn("#eff6ff",C.accent,{padding:"3px 7px",fontSize:11,minHeight:0})}}>U</button>
                                <button onClick={()=>moveMet(r.id,1)} style={{...btn("#eff6ff",C.accent,{padding:"3px 7px",fontSize:11,minHeight:0})}}>D</button>
                                <button onClick={()=>setMetPlan(p=>p.filter(x=>x.id!==r.id))} style={{...btn("#fef2f2",C.red,{padding:"3px 7px",fontSize:11,minHeight:0,border:"1px solid #fca5a5"})}}>X</button>
                              </div>}</td>
                            </tr>
                          );})}
                          </tbody>
                        </table>
                      </div>
                    </>}
                  </div>
                );
              })}
              {boatSets.length>0&&<div style={{background:C.navy,borderRadius:9,padding:"11px 16px",display:"flex",gap:14,alignItems:"center",color:"#fff",flexWrap:"wrap"}}>
                {[{l:"RUNS",v:shownMet.length},{l:"SETS",v:boatSets.length},{l:"METERS",v:fmtNum(shownMet.reduce((s,r)=>s+toInt(r.length),0))}].map(c=>(
                  <span key={c.l}><span style={{color:"rgba(255,255,255,.32)",fontSize:11}}>{c.l}: </span><span style={{fontWeight:800}}>{c.v}</span></span>
                ))}
              </div>}
            </div>
          )}

          <div style={{textAlign:"center",padding:"14px 0 4px",fontSize:11,color:"#94a3b8",borderTop:"1px solid #dde3ed",marginTop:14}}>
            Plan Power v2.0 - GLS Polyfilms Pvt. Ltd.
          </div>
        </div>

        {!showChat&&<button className="pp-fab" onClick={()=>setShowChat(true)} title="AI Planning Assistant">AI</button>}
        {toast&&<div className="pp-toast">{toast}</div>}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
